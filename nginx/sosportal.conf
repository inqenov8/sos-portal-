# ─────────────────────────────────────────────────────────────────────────────
# SOS Portal — Nginx Configuration
# Save to: /etc/nginx/sites-available/sosportal
#
# BEFORE USING: Replace 192.168.1.50 with your actual VM IP address or
# internal DNS name (e.g. sos.inq.local)
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name 192.168.200.27;    # <-- CHANGE THIS
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name 192.168.200.27;    # <-- CHANGE THIS

    # SSL Certificate (self-signed — see deployment guide Section 5.2)
    ssl_certificate     /etc/ssl/sos/sos.crt;
    ssl_certificate_key /etc/ssl/sos/sos.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve the built React frontend
    location / {
        root /var/www/sosportal/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS, CSS, images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Compression
        gzip on;
        gzip_vary on;
        gzip_types
            text/html
            text/plain
            text/css
            application/javascript
            application/json
            image/svg+xml;
    }

    # Proxy all /api/* requests to the Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # File upload size limit (for evidence attachments)
        client_max_body_size 10M;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/sosportal-access.log;
    error_log  /var/log/nginx/sosportal-error.log;
}
